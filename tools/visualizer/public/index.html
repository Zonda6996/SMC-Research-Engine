<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Fib Playbook — визуализатор</title>
		<style>
			:root {
				--bg: #131722;
				--bg-panel: #1e222d;
				--bg-hover: #2a2e39;
				--border: #363a45;
				--text: #d1d4dc;
				--text-dim: #787b86;
				--accent: #2962ff;
				--green: #26a69a;
				--red: #ef5350;
				--yellow: #ffb74d;
			}
			* { margin: 0; padding: 0; box-sizing: border-box; }
			body {
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Trebuchet MS', sans-serif;
				background: var(--bg);
				color: var(--text);
				display: flex;
				flex-direction: column;
				height: 100vh;
				overflow: hidden;
				font-size: 13px;
			}

			/* ---------- toolbar ---------- */
			.toolbar {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 6px 12px;
				background: var(--bg-panel);
				border-bottom: 1px solid var(--border);
				flex-wrap: wrap;
			}
			.toolbar .brand {
				font-size: 13px;
				font-weight: 600;
				color: var(--text);
				margin-right: 8px;
				white-space: nowrap;
			}
			.toolbar .brand span { color: var(--accent); }
			.toolbar select, .toolbar input[type='number'], .toolbar input[type='text'] {
				background: var(--bg);
				color: var(--text);
				border: 1px solid var(--border);
				border-radius: 4px;
				padding: 5px 8px;
				font-size: 13px;
			}
			.toolbar input[type='number'] { width: 76px; }
			.toolbar button {
				background: var(--accent);
				color: #fff;
				border: none;
				border-radius: 4px;
				padding: 6px 14px;
				font-size: 13px;
				font-weight: 600;
				cursor: pointer;
			}
			.toolbar button:hover { filter: brightness(1.15); }
			.toolbar button:disabled { opacity: 0.5; cursor: wait; }
			.toolbar .spacer { margin-left: auto; }
			.dataset-label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

			/* сегментированные переключатели ТФ */
			.tf-group { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
			.tf-group button {
				background: var(--bg);
				color: var(--text-dim);
				border: none;
				border-radius: 0;
				padding: 5px 10px;
				font-weight: 400;
			}
			.tf-group button.active { background: var(--bg-hover); color: var(--text); font-weight: 600; }

			/* ---------- layout ---------- */
			.main { display: flex; flex: 1; overflow: hidden; }
			.chart-wrap { flex: 1; position: relative; min-width: 0; }
			#chart { width: 100%; height: 100%; }

			#tooltip {
				position: absolute;
				display: none;
				background: var(--bg-panel);
				border: 1px solid var(--border);
				border-radius: 4px;
				padding: 8px 10px;
				font-size: 12px;
				pointer-events: none;
				z-index: 20;
				max-width: 320px;
				line-height: 1.5;
				box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
			}
			#tooltip .reason { color: var(--text-dim); margin-top: 4px; font-size: 11px; }

			/* ---------- sidebar ---------- */
			.sidebar {
				width: 360px;
				background: var(--bg-panel);
				border-left: 1px solid var(--border);
				display: flex;
				flex-direction: column;
				flex-shrink: 0;
				overflow: hidden;
			}
			.sidebar-scroll { overflow-y: auto; flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
			.panel {
				background: var(--bg);
				border: 1px solid var(--border);
				border-radius: 6px;
				padding: 10px;
			}
			.panel h2 {
				font-size: 11px;
				color: var(--text-dim);
				text-transform: uppercase;
				margin-bottom: 8px;
				letter-spacing: 0.6px;
			}
			.row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
			.row label { color: var(--text-dim); font-size: 12px; }
			.row select {
				background: var(--bg-panel);
				color: var(--text);
				border: 1px solid var(--border);
				border-radius: 4px;
				padding: 3px 6px;
				font-size: 12px;
				flex: 1;
			}
			.row input[type='checkbox'] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); }

			/* таблица моделей */
			table.models { width: 100%; border-collapse: collapse; font-size: 12px; }
			table.models th {
				color: var(--text-dim);
				text-align: right;
				font-weight: 400;
				padding: 2px 4px;
				border-bottom: 1px solid var(--border);
			}
			table.models th:first-child, table.models td:first-child { text-align: left; }
			table.models td { padding: 3px 4px; text-align: right; white-space: nowrap; }
			table.models tr.active td { background: var(--bg-hover); }
			table.models tr { cursor: pointer; }
			table.models tr:hover td { background: var(--bg-hover); }
			.pos { color: var(--green); }
			.neg { color: var(--red); }
			.dim { color: var(--text-dim); }

			/* список сделок */
			.trades-list { display: flex; flex-direction: column; gap: 2px; }
			.trade-row {
				display: flex;
				align-items: center;
				gap: 6px;
				padding: 5px 6px;
				border-radius: 4px;
				cursor: pointer;
				font-size: 12px;
				border: 1px solid transparent;
			}
			.trade-row:hover { background: var(--bg-hover); }
			.trade-row.selected { border-color: var(--accent); background: var(--bg-hover); }
			.trade-row .dir {
				width: 34px;
				text-align: center;
				border-radius: 3px;
				font-size: 10px;
				font-weight: 700;
				padding: 2px 0;
			}
			.dir.long { background: rgba(38, 166, 154, 0.18); color: var(--green); }
			.dir.short { background: rgba(239, 83, 80, 0.18); color: var(--red); }
			.trade-row .scen { color: var(--text-dim); width: 40px; }
			.trade-row .netr { margin-left: auto; font-weight: 600; }
			.trade-row .status { color: var(--text-dim); font-size: 11px; }
			.badge {
				font-size: 9px;
				padding: 1px 5px;
				border-radius: 3px;
				background: rgba(255, 183, 77, 0.15);
				color: var(--yellow);
				font-weight: 700;
			}
			.hint { font-size: 11px; color: var(--text-dim); line-height: 1.5; margin-top: 6px; }
			.count-label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }

			#status {
				position: absolute;
				top: 12px;
				left: 12px;
				z-index: 10;
				background: var(--bg-panel);
				border: 1px solid var(--border);
				border-radius: 4px;
				padding: 6px 12px;
				font-size: 12px;
				color: var(--text-dim);
				display: none;
			}
		</style>
	</head>
	<body>
		<div class="toolbar">
			<div class="brand">Fib <span>Playbook</span></div>
			<input type="text" id="symbol" list="symbolsList" value="BTC/USDT" style="width: 110px" />
			<datalist id="symbolsList"></datalist>
			<div class="tf-group" id="tfGroup">
				<button data-tf="15m">15m</button>
				<button data-tf="30m" class="active">30m</button>
				<button data-tf="1h">1h</button>
				<button data-tf="4h">4h</button>
			</div>
			<input type="number" id="limit" value="2000" min="200" max="20000" step="100" title="Свечей" />
			<select id="source">
				<option value="fresh">Binance (live)</option>
				<option value="fixture">Фикстура (offline)</option>
			</select>
			<button id="loadBtn">Загрузить</button>
			<div class="spacer"></div>
			<div class="dataset-label" id="datasetLabel">—</div>
		</div>

		<div class="main">
			<div class="chart-wrap">
				<div id="chart"></div>
				<div id="tooltip"></div>
				<div id="status"></div>
			</div>

			<div class="sidebar">
				<div class="sidebar-scroll">
					<div class="panel">
						<h2>Модели входа — сравнение (t100, BingX)</h2>
						<table class="models" id="modelsTable"></table>
						<div class="hint">
							Клик по строке — выбрать модель для маркеров на графике.
							saved — отменённые лоссы (закрытие за стопом до входа),
							missed — упущенные тейки. cf — netR touch-модели тех же сделок.
						</div>
					</div>

					<div class="panel">
						<h2>Фильтры</h2>
						<div class="row"><label style="width: 70px">Сценарий</label>
							<select id="fScenario">
								<option value="all">все</option>
								<option value="ote">ote</option>
								<option value="deep">deep</option>
							</select>
						</div>
						<div class="row"><label style="width: 70px">Направление</label>
							<select id="fDirection">
								<option value="all">все</option>
								<option value="long">long</option>
								<option value="short">short</option>
							</select>
						</div>
						<div class="row"><label style="width: 70px">Результат</label>
							<select id="fResult">
								<option value="all">все</option>
								<option value="win">win</option>
								<option value="loss">loss</option>
								<option value="missed">missed / saved</option>
							</select>
						</div>
						<div class="row">
							<input type="checkbox" id="fBigbarOnly" />
							<label for="fBigbarOnly">только bigbar-сетапы</label>
						</div>
						<div class="row">
							<input type="checkbox" id="fApplyBigbar" />
							<label for="fApplyBigbar">применить bigbar-фильтр (скрыть срезанные)</label>
						</div>
						<div class="row">
							<input type="checkbox" id="toggleEvents" checked />
							<label for="toggleEvents">BOS / CHoCH</label>
						</div>
						<div class="row">
							<input type="checkbox" id="toggleProtected" />
							<label for="toggleProtected">Protected-уровни</label>
						</div>
					</div>

					<div class="panel">
						<h2>Сделки</h2>
						<div class="count-label" id="tradesCount"></div>
						<div class="trades-list" id="tradesList"></div>
					</div>
				</div>
			</div>
		</div>

		<script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js"></script>
		<script src="app.js"></script>
	</body>
</html>
